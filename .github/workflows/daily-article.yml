name: Daily Zenn Article Generator

on:
  schedule:
    # 毎日 22:00 UTC (= JST 07:00) に1本生成
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Restore generator state
        uses: actions/cache@v4
        with:
          path: scripts/.generator_state.json
          key: generator-state-${{ github.run_number }}
          restore-keys: generator-state-

      - name: Generate article
        run: |
          OUTPUT=$(python scripts/generate_article.py 2>&1)
          echo "$OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ && git add -f scripts/.generator_state.json
          git diff --cached --quiet && echo "No new articles" && exit 0
          git commit -m "Add daily article ($(date +%Y-%m-%dT%H:%M UTC))"
          git push
